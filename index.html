function shuffleArr(arr){ const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

// ─── MARKDOWN-LITE RENDERER ───────────────────────────────────────────────
// Handles: ## headers, **bold**, > blockquote, - lists, | tables |, --- hr, plain paragraphs
function MD({text,c}){
  const lines=text.split('\n');
  const blocks=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(line.trim()===''){i++;continue;}
    if(line.startsWith('### ')){blocks.push({t:'h3',v:line.slice(4)});i++;continue;}
    if(line.startsWith('## ')){blocks.push({t:'h2',v:line.slice(3)});i++;continue;}
    if(line.startsWith('# ')){blocks.push({t:'h1',v:line.slice(2)});i++;continue;}
    if(line.trim()==='---'){blocks.push({t:'hr'});i++;continue;}
    if(line.startsWith('> ')||line.startsWith('>')){
      let buf=[];
      while(i<lines.length&&(lines[i].startsWith('>'))){buf.push(lines[i].replace(/^>\s?/,''));i++;}
      blocks.push({t:'quote',v:buf.join('\n')});continue;
    }
    if(line.startsWith('|')){
      let buf=[];
      while(i<lines.length&&lines[i].startsWith('|')){buf.push(lines[i]);i++;}
      blocks.push({t:'table',v:buf});continue;
    }
    if(line.startsWith('- ')||line.startsWith('* ')){
      let buf=[];
      while(i<lines.length&&(lines[i].startsWith('- ')||lines[i].startsWith('* '))){buf.push(lines[i].slice(2));i++;}
      blocks.push({t:'ul',v:buf});continue;
    }
    if(/^\d+\.\s/.test(line)){
      let buf=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){buf.push(lines[i].replace(/^\d+\.\s/,''));i++;}
      blocks.push({t:'ol',v:buf});continue;
    }
    // paragraph - collect until blank line or special line
    let buf=[line];i++;
    while(i<lines.length&&lines[i].trim()!==''&&!/^(#|>|\||-|\*|\d+\.|---)/.test(lines[i])){buf.push(lines[i]);i++;}
    blocks.push({t:'p',v:buf.join('\n')});
  }
  const inline=(str,key)=>{
    // bold **text**
    const parts=str.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p,idx)=>{
      if(p.startsWith('**')&&p.endsWith('**')) return <strong key={key+'-'+idx}>{p.slice(2,-2)}</strong>;
      return <React.Fragment key={key+'-'+idx}>{p}</React.Fragment>;
    });
  };
  return (
    <div>
      {blocks.map((b,idx)=>{
        if(b.t==='h1')return <div key={idx} style={{fontSize:16,fontWeight:700,color:c.accent,marginTop:idx===0?0:16,marginBottom:6}}>{b.v}</div>;
        if(b.t==='h2')return <div key={idx} style={{fontSize:14,fontWeight:700,color:c.text,marginTop:idx===0?0:16,marginBottom:6,borderBottom:`1px solid ${c.border}`,paddingBottom:4}}>{inline(b.v,idx)}</div>;
        if(b.t==='h3')return <div key={idx} style={{fontSize:12,fontWeight:700,color:c.accent,letterSpacing:'0.08em',marginTop:idx===0?0:12,marginBottom:4}}>{inline(b.v,idx)}</div>;
        if(b.t==='hr')return <div key={idx} style={{height:1,background:c.border,margin:'12px 0'}}/>;
        if(b.t==='quote')return (
          <div key={idx} style={{background:c.flashBack,border:`1px solid ${c.flashBorder}`,borderRadius:10,
            padding:'10px 12px',margin:'6px 0',fontSize:12,lineHeight:1.6,whiteSpace:'pre-wrap',
            color:c===T.dark?'#cfe0ff':'#1e3a5f'}} className="mono">{inline(b.v,idx)}</div>
        );
        if(b.t==='ul')return (
          <ul key={idx} style={{margin:'4px 0 8px 18px',fontSize:12.5,lineHeight:1.6,color:c.text}}>
            {b.v.map((li,j)=><li key={j}>{inline(li,idx+'-'+j)}</li>)}
          </ul>
        );
        if(b.t==='ol')return (
          <ol key={idx} style={{margin:'4px 0 8px 18px',fontSize:12.5,lineHeight:1.6,color:c.text}}>
            {b.v.map((li,j)=><li key={j}>{inline(li,idx+'-'+j)}</li>)}
          </ol>
        );
        if(b.t==='table'){
          const rows=b.v.filter(r=>!/^\|[\s-:|]+\|$/.test(r))
            .map(r=>r.split('|').slice(1,-1).map(c=>c.trim()));
          const [head,...body]=rows;
          return (
            <table key={idx}>
              <thead><tr>{head.map((h,j)=><th key={j} style={{color:c.accent}}>{h}</th>)}</tr></thead>
              <tbody>{body.map((r,ri)=><tr key={ri}>{r.map((cell,ci)=><td key={ci} style={{color:c.text}}>{inline(cell,ri+'-'+ci)}</td>)}</tr>)}</tbody>
            </table>
          );
        }
        return <div key={idx} style={{fontSize:12.5,lineHeight:1.7,color:c.text,margin:'4px 0',whiteSpace:'pre-wrap'}}>{inline(b.v,idx)}</div>;
      })}
    </div>
  );
}

// ─── CIRCULAR CHART ───────────────────────────────────────────────────────
function CircleChart({pct,size=130,sw=10,color='#fbbf24',bg='#1e1e1e',children}){
  const r=(size-sw)/2;
  const circ=2*Math.PI*r;
  const dash=(pct/100)*circ;
  return(
    <div style={{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size} style={{position:'absolute',top:0,left:0,transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill='none' stroke={bg} strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill='none' stroke={color}
          strokeWidth={sw} strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap='round'
          style={{transition:'stroke-dasharray 0.6s ease'}}/>
      </svg>
      <div style={{position:'relative',textAlign:'center'}}>{children}</div>
    </div>
  );
}

function parsePart(str,i,total){
  const opt=str.match(/^(OPTION \d+ [^\n:]+):\n([\s\S]+)/);
  if(opt)return{label:opt[1].toUpperCase(),text:opt[2].trim()};
  const iff=str.match(/^(→ If [^\n]+)\n([\s\S]+)/);
  if(iff)return{label:iff[1].replace('→ ','').toUpperCase(),text:iff[2].trim()};
  return{label:total===1?'RESPONSE':`PART ${i+1} OF ${total}`,text:str};
}

  {term:'Linehaul',section:'Core Concepts',def:'The transportation charge from point A to B. In LTL it\'s the terminal-to-terminal movement; in truckload it\'s often the whole charge. Some carriers fold accessorials (like tarp charges) into the linehaul number instead of breaking them out.'},

  {term:'Deadhead',section:'Core Concepts',def:'When a truck drives empty to reposition for its next load. Carriers avoid this — the reason behind backhaul discounts.'},
  {term:'Dedicated Freight',section:'Core Concepts',def:'Trucks essentially assigned to a customer on a recurring lane (e.g. 3 trucks dedicated to a weekly Chicago→Dallas run). Hard to displace.'},

  {term:'Partial Truckload',section:'Core Concepts',def:'Bigger than LTL (~6-18 pallets) but not a full trailer. Runs like mini-FTL — one driver, direct, priced per mile. More reliable than Volume LTL, costs more.'},
  {term:'Full Truckload (FTL)',section:'Core Concepts',def:'Customer gets the whole trailer. One driver, direct, no terminal stops, no shared space.'},
  {term:'Live Load',section:'Core Concepts',def:'Driver waits at the shipper\'s dock while freight is loaded, then drives off with it.'},
  {term:'Drop Trailer',section:'Core Concepts',def:'Carrier drops an empty trailer ahead of time; shipper loads on their own schedule, carrier picks up loaded trailer later.'},
  {term:'Live Offload',section:'Core Concepts',def:'Driver waits at the receiver\'s dock while freight is unloaded, then leaves with the empty trailer.'},

{id:'ltl',name:'LTL',md:`## LTL (Less Than Truckload)

**What it is:** The "flying coach" of freight — your shipment shares trailer space with other shippers. Multiple drivers touch it (local pickup → line haul → local delivery) via the hub-and-spoke network.

**When customers use it:** 1-6 pallets, doesn't need a dedicated truck.

**Why it's never guaranteed:** Multiple terminal touches = estimated, not guaranteed, transit times.

**Support:** insidesalesltl@priority1.com (quoting/booking/tracking) | claims@priority1.com | enterprise@priority1inc.com
**Escalation:** Forrest Goss (Director of LTL Support) | Will Sison (VP of Pricing)

**5 data points support needs for fast quotes:** origin zip, destination zip, pallet count, dimensions (LxWxH), weight, commodity description.

### Common New-Rep Mistakes
- Never sell against FedEx *direct* the same way as FedEx-via-broker — different competitive dynamic.
- Don't book without an NMFC code — look it up, don't guess.
- "Standard pallet" is never a complete dimension answer.`},

{id:'volltl',name:'Volume LTL & Partial TL',md:`## Volume LTL & Partial Truckload

**The 6+ pallet decision** — too big for regular LTL, won't fill a truck:

| | Volume LTL | Partial Truckload |
|---|---|---|
| What it is | "Market rate" for LTL carrier to move 6+ pallets | Cheaper via truckload network |
| Network | LTL (hub-and-spoke) | Truckload (one driver, direct) |
| Damage risk | Higher (more handling) | Lower (fewer touches) |
| Transit | Estimated | More predictable |
| Cost | Cheaper | More expensive |

**How to position it:** Get quotes for BOTH and let the customer choose — cost (Volume LTL) vs. reliability (Partial TL).`},

{id:'dryvan',name:'Dry Van / FTL',md:`## Dry Van / Full Truckload (FTL)

**What it is:** Standard enclosed 53ft trailer. Customer gets the whole trailer — one driver, direct, no terminal stops.

**Fast stats:** 53ft typical, ~44-45k lbs usable, avg cost $800-$5,000+, moderate liability, typically palletized.

### Support Contact (by office)

| Little Rock | insidesaleslyons@priority1.com |

| Greenville | greenville@priority1.com |

**Escalation:** Matt Watson, Director of Dry Van Operations

**Pricing factors:** supply & demand on the lane, weather, time of day/month (month-end often higher), special requirements (hazmat, tanker endorsement, specialized equipment).`},

{id:'flatbed',name:'Flatbed',md:`## Flatbed

**What it is:** Open trailer for anything that has to be side-loaded.

**Fast stats:** 48ft typical, 48,000 lb max, LOW liability, NOT usually palletized, avg cost $800-$7,000+. Equipment: tarps, chains, dunnage. Driver requirements: PPE & TWIC.

**Can offer Partial Truckload if 500+ miles.**

**Common industries:** Construction, Oil & Gas, Oversized Equipment, Wire & Cable.

**Hot Shot/Gooseneck:** smaller flatbed (20-40ft, max 18,500 lbs). Good GP opportunity. Regionally "hotshot" can mean expedited — clarify.

**Oversized loads:** Yes — get exact dims & weight, flatbed team quotes permit price + linehaul.

**Support:** flatbed@priority1.com — include weight, dimensions, loading plan.
**Escalation:** Matt Luehring, Director of Flatbed Operations

### Real Example
Burr Ridge, IL → Rochester, NY, 610mi, quoted $3,850 (~$6.31/mi) vs customer's $3/mi expectation. See Journal/Case Studies.`},

{id:'temp',name:'Temp-Controlled (Reefer)',md:`## Temperature-Controlled (Reefer)

**What it is:** Only option when product must be held to a specific temperature.

**Fast stats:** 53ft typical, 45,000 lb max, palletized, avg cost $900-$7,000+. Also available as temp-controlled sprinter vans/box trucks.

**Common industries:** Pharmaceuticals, Meat, Flowers, Medical Supplies.

**Support:** tempcontrolled@priority1.com — include commodity AND exact temperature.
**Escalation:** Chea Peterman, Manager of Carrier Procurement

### The Big Selling Point
Dry LTL's "Protect from Freeze" accessorial is, per the VP of LTL, **"a blanket and a prayer"** — voided by weather delays. A true temp-controlled trailer is the ONLY real protection. Target customers who STOP shipping seasonally instead of switching modes.

### Common New-Rep Mistakes
- "Standard pallet" is not a real answer — confirm L×W×H every time.
- Never accept vague temps ("frozen," "chilled," "ambient") — get the exact temperature or range.
- If total value is over $100k, confirm for insurance.

### Real Example
Global Foods Group — reefer LTL + FTL, -10°F deep frozen. See Journal/Case Studies.`},

{id:'expedited',name:'Expedited',md:`## Expedited

**What it is:** For time-sensitive or very expensive/small shipments — safest, guaranteed-delivery option. Price usually isn't the main concern. Regionally called "hotshot."

**Fast stats:**
| Vehicle | Size | Max Weight |
|---|---|---|
| Sprinter Van | 96"-172" | 3,000 lbs |
| Box/Straight Truck | 16-26ft | 9,500 lbs |

Avg cost: $1,500+.

**Common industries:** Aerospace, Oil & Gas, Manufacturing, "Line Down," Fragile & High Value.

**When to lead with it:** high-value single-truck freight, medical/pharma with tracking requirements, custom products avoiding terminal handling, claims-history customers (<0.5% claims rate).

**Discovery questions:**
- "Who handles your expedited shipping?"
- "Do you run sprinter vans and box trucks?"
- Frequency? Current carriers (Load One, CH Robinson, TQL)? Cheapest rate vs closest truck?

**Support:** expedited@priority1.com — include pickup/delivery zip, pallet count, weight/pallet, dimensions, dates.
**Escalation:** Jimmy Anderson, Director of Expedited Operations`},

{id:'drayage',name:'Drayage',md:`## Drayage

**What it is:** Moving a container to/from a port to a shipper/receiver/warehouse for transload onto over-the-road transport. The U.S. is primarily an import market — drayage is the connector.

**Fast stats:**
| Container | Size | Max Weight |
|---|---|---|
| Standard | 20ft | 38,000 lbs |
| High Cube | 40-45ft | 44,000 lbs |

Can be reefer or hazmat. Other types: Flatrack (oversized), Open Top (tall cargo).

**Common industries:** Seafood, Furniture, Household Goods, Machinery.

**Support:** drayage@priority1.com. Note: team contacts the ports directly for quotes — response may not be immediate.
**Escalation:** Brad Maxwell, Director of Drayage Operations`},

{id:'cabotage',name:'Cabotage',md:`## Cabotage — When To Pivot Here Instead

**What it is:** Priority1's SaaS offering (Cabo FM) — a TMS giving clients access to Priority1's negotiated carrier rates, but the CLIENT manages bids/carriers themselves (not Priority1's brokerage).

**Best practice:** Quote BOTH the brokerage AND Cabotage option, let the customer decide. Cabotage carries less liability since the customer separates pallets at terminals themselves.

**Who it's for:** Large customers (100+ truckload shippers) wanting large carrier access without giving up control of freight management.

**How do I know which to sell?** Always sell all-in brokerage unless you consult your supervisor/manager/director on a large deal. Don't decide this alone.`},

const SCRIPTS=[
{id:'before',name:'Before You Dial',md:`## Before You Dial

**General call confidence:**
- Be confident and SMILE
- Control the conversation — be DIRECT with date/time suggestions
- Don't apologize for calling — no "I'm sorry" for calling unannounced
- Don't create an objection if there isn't one
- Push twice if they give another objection after your first push

**Invoice-specific phrasing (Section 6 only):**
- "One thing I am going to need from you is..." — this is the ONE place that phrase belongs.

**Find the TRUE decision maker.** Start at the top (owner). If passed to a shipping manager, qualify them — the person who handles day-to-day freight is not automatically who chose the provider.`},

{id:'mvpcc',name:'MVPCC Qualifying',md:`## MVPCC — Qualifying Questions
*Use for Owner AND Shipping Manager — same sequence every time.*

**M — Mode**
> "What modes are you currently using to move your products?"

**V — Volume**
> "What's the average number of shipments you send out per week/month?"

**P — Product / Commodity**
> "What commodity are you guys shipping?"

**C — Competitor**
> "Who are you guys currently using for your shipping?"

**C — Decision Process**
> "What was your decision-making process for bringing them on?"

**Follow-up — always ask:**
> "Is there anyone else that was involved in that decision-making process?"`},

{id:'gatekeeper',name:'1. Gatekeeper',md:`## 1. Cold Call — Gatekeeper

**Opening line:**
> "Hey, this is _____ with Priority1. I am looking to speak to the owner or whoever is in charge at that location — who would that be?"

**After they give a name:**
> "Great, if you could transfer me over to _____, I'd really appreciate it." *(Push #1)*

**Before the transfer — protect against a dead transfer:**
> "Before you go ahead and transfer me — just in case we get disconnected, could I grab [name]'s email and a direct line?"

### Gatekeeper Responses

**"He/She is not available"**
> "No problem. You know, you can probably help me out. I'm ______ with Priority1, which is a freight company that specializes in LTL, full truckload, and expedited freight. Does the nature of your business require you to ship freight on a regular basis?"
→ "Not Sure" or "Yes We Do" → ask MVPCC, then ask to be transferred to shipping manager

**"What's the reason for this call?"** *(Push #2)*
> "I was just calling to make a quick introduction, if you could transfer me over to ______, I'd really appreciate it."

**"He/she only meets by appointment."** *(Push #3)*
> "I actually go by appointment as well, so that's exactly why I'm calling. If you could transfer me over to ______, I'd really appreciate it."

→ "Transferring" → go to Owner/CEO Transfer
→ Another objection → keep pushing (push twice total before backing off)

**"Not Sure" (if they ship)**
> "No problem. Maybe the shipping manager / logistics manager can help me. Do you know who that would be?"

**If GK won't transfer:** Get owner's contact info AND shipping manager info, end the call gracefully.`},

{id:'sm',name:'2. Shipping Manager Transfer',md:`## 2. Shipping Manager Transfer

> "Hi, my name is ______. I work for Priority1 and I'm looking to speak with _____ [or 'the shipping manager' if no name]."

**Once connected:**
> "Hey ______. Like I said, I am ______ with Priority1. We're a freight company specializing in LTL, full truckload, and expedited freight. I realize I am calling unannounced, but was curious if the nature of your business has you shipping freight on a regular basis."

**⚠️ Rule:** You may get cut off with an objection before asking qualifying questions. Do NOT push for a meeting unless they confirm they're the true DM.

**"Yes we ship"** → Ask MVPCC

→ "I brought them on because..." → They ARE the DM → Setting Up The Meeting
→ "My boss/owner brought them on..." → NOT the DM → get Key Questions, ask to speak to owner → Owner/CEO Transfer`},

{id:'owner',name:'3. Owner/CEO Transfer',md:`## 3. Owner / CEO Transfer

> "Hey, this is ______ with Priority1. How are you?"

Owner: "Good, how are you?"

> "Good, thank you for asking. I realize I am calling totally unannounced, but the reason I am calling is because we're a freight company specializing in LTL, full truckload, and expedited freight. Curious if the nature of your business requires you to ship freight on a regular basis?"

**⚠️ Rule:** Don't push for a meeting until you confirm (1) they are the true DM AND (2) they're qualified.

**"Yes we ship"** → Ask MVPCC
**"Can you talk to ___? He/she handles all the freight"** → The Pass Down

- "I brought them on because..." → They ARE the DM → Setting Up The Meeting
- "My shipping manager brought them on..." → ask Key Questions, end the call, follow up through SM

### Key Questions (when owner says SM decides)
- Confirm decision maker's name (boss/owner), get phone number and email
- "What do you guys do?" "Is this your headquarters?"
- "Do you have other locations? Do they ship? Who manages their shipping?"
- "How do you receive your raw materials / inbound freight — who pays for and arranges that?"
- "How do you get product in, what do you do with it here, how does it get back out?"
- "How do you currently quote and book your freight?" (identify their tech)
- "How are you currently tracking your freight?"
- "Do you ever hear from your accounting team because your invoices don't match what you were originally quoted?"
- "When's the last time you had to ship expedited freight to meet a deadline?"
- "Is there anything you'd like to see improved with your current process?"

**Wrap-up:**
> "Thanks for your time today! I understand [owner's name] is out. Do you know when they will be returning?"
> "Perfect, I will be sure to follow up then. When your owner returns, can you please let him/her know that I reached out?"`},

{id:'passdown',name:'4. The Pass Down',md:`## 4. The Pass Down

*When the owner says "Can you talk to ___? He/she handles the freight."*

> "I can definitely do that, but does ____ have the ability to switch to Priority1 without your approval?"

**YES, he/she does:**
> "Oh perfect! I am confident Priority1 can save you time and money, and I'm sure those are aspects you both find valuable. Could you please pass me over to ____ and let him know that we've spoken and he/she has your blessing to speak with me?"
→ Then qualify the shipping manager once transferred (MVPCC)

**NO, he/she doesn't:** ⚠️ *(wording below — confirm against source when possible)*
> "Oh okay, well it sounds like [Mike] handles the day-to-day freight, but since you oversee the bigger picture, you're actually in the best position to understand how changes in freight are going to affect your supply chain and overall cost."
→ Continue qualifying the owner directly → Setting Up The Meeting`},

{id:'meeting',name:'5. Setting Up The Meeting',md:`## 5. Setting Up The Meeting — 3 Options

Pick whichever fits the flow. All three set expectations on length and topic without over-explaining.

**Option 1 — Direct/Confident:**
> "Awesome — based on what you've told me, I'm confident we can put together a quick cost analysis that could save you some real money. I'd like to grab 15 to 20 minutes on your calendar to walk through it together. Does tomorrow at [time] work?"

**Option 2 — Competitor-anchored:**
> "We've had a lot of success with companies in a similar spot to yours going up against [competitor]. I'd like to set up a short meeting — probably 15 to 20 minutes — where we can go over a cost comparison side by side. Does [day] at [time] work for you?"

**Option 3 — Value-forward:**
> "Based on everything you just shared, I think there's a real opportunity for us to help here. I'd like to grab some time — just 15 to 20 minutes — to walk you through what that could look like and run some numbers together. Does [day] at [time] work?"

**They say yes:**
> "Perfect. I have got you down for [insert time]. I will go ahead and send an Outlook invite so we've both got it on our schedules. What's a good email for you?"

*(Get the email, repeat it back. Confirm time zone.)*

> "Do you prefer meeting over Microsoft Teams or Zoom?"
> "Great, I am sending over the meeting invite right now. Please let me know that you have received it."`},

{id:'invoices',name:'6. Getting Invoices',md:`## 6. Getting The Invoices — 3-Push Approach

> "One thing I am going to need for the meeting is just 10-15 recent freight invoices. It will really help guide the conversation and make for the most productive meeting possible. Can you make sure to bring those for us?"

**If they say no:**

**Push #1 (verify setup):**
> "I completely understand what you're saying. The reason I need to see your invoices is to verify volume and destinations. Not to mention it helps me understand how you are set up with your current vendor. So, can you make sure to bring those for us?"

**Push #2 (cost comparison):**
> "I hear you, [person's name]. Invoices will allow me to put together a true cost comparison — or apples-to-apples comparison — against your current provider. I am very confident I can help you out financially. So can you make sure to bring those for us?"

**Push #3 (LTL only — free freight bill audit):**
> "I completely understand what you're saying. One of the most important value adds we offer is the free freight bill audit. The freight industry is known for quoting one amount and billing something else. More than half of my current customers didn't know they had a billing issue before they made the switch over to Priority1. I would love a chance to look at the bills to see if this is happening to your company. So, can you make sure to bring those for us?"

**Push count: 1-2 for truckload, 1-3 for LTL.**

**Why truckload skips Push #3:** Freight bill audits catch billing errors that creep in after the fact (reclasses, reweighs, accessorials) — common in LTL's hub-and-spoke model. Truckload rates are agreed as a flat rate before pickup, so there's far less to audit after delivery. Push #2 is already the full value for truckload.`},

{id:'warm',name:'7. Warm Call / IBS',md:`## 7. Warm Call — IBS / Setting a Meeting
*Use when you already have qualifying info from a lower level or gatekeeper, and you're calling the TRUE DM with that context in hand.*

**1. Introduction**
> "Hi, this is Alexis with Priority1. How are you?"

**2. Disarming statement**
> "I realize I am calling totally unannounced, but the reason I am calling..."

**3. Initial Benefit Statement**
> "...is because we're a freight company specializing in LTL, full truckload, and expedited freight. I spoke with [Jim] in your warehouse last week and we discussed your current setup with [GlobalTranz]."

**4. Power statement**
> "Based on our conversation, I am very confident we can put you in a better position."

**5. Close for appointment** — use the 3 options from Setting Up The Meeting.

**6. Commitment on the appointment**
> "I've got you down for [insert time] tomorrow. I will go ahead and send an outlook invite so we've both got it on our schedules. What's a good email for you?" *(confirm time zone)*
>
> "One thing I'm going to need for the meeting is just 10-15 recent freight invoices..."
>
> "One last question before I go — assuming we can make your process more efficient and save you money, is there any reason that you wouldn't be willing to switch your business to Priority1?"

**DM: "I don't think so."**
> "It was nice to meet you, and I look forward to our meeting!"`},

{id:'bestpractices',name:'8. Cold Calling Best Practices',md:`## 8. Cold Calling — Best Practices

- It's not what you say, it's HOW you say it — be confident
- Push twice to get to the DM
- Always end with a question — "Who would that be?"
- DO NOT apologize for calling
- Don't create an objection if there isn't one
- ALWAYS close for time — "When is good for you to meet?" be DIRECT with your date/time suggestion`},

{id:'mixed',name:'9. Mixed Bucket (LTL+TL)',md:`## 9. Mixed Bucket (LTL + Truckload) Qualifying
*Use when a DM ships via BOTH — qualify each mode fully with MVPCC, one at a time, before closing.*

**1-3. Intro / Disarm / IBS** — same as Section 7/Gatekeeper openers.

**4. DM says they ship both — qualify LTL first:**
> "Got it — let's start with LTL. What's the average number of LTL shipments you send out per week/month?" *(Volume)*

DM: "3-4 times a week."
> "And what are you typically shipping on those?" *(Commodity)*
> "Who are you currently using for your LTL shipping?" *(Competitor)*
> "What was your decision-making process for bringing them on?" *(Decision)*
> "Is there anyone else involved in that decision?" *(Follow-up)*

**Then circle back to truckload — same sequence:**
> "Perfect — now let's circle back to truckload. What's the average number of truckload shipments you send out per week/month?"
> ... (Commodity, Competitor, Decision, Follow-up)

**5. Close for a specific appointment — both modes:**
> "Okay, well — based on everything you've shared, I'm confident Priority1 would be a great fit for both your LTL and truckload freight. I'd like to set up a meeting so we can go over both side by side — does [day] at [time] work?"

### If they don't have load details ready
> "No worries — when's your next load expected to go out?"

- Next load **before** the meeting → "Could you send me the details when you have them? I'd love to use real numbers in our meeting."
- Next load **after** the meeting, plenty of gap → "Perfect, we can go over a past load in the meeting, and use this one as a follow-up afterward."
- Gap is tight (meeting in 4 days, load in 2) → "I'll follow up with you in a day or two to grab those details before our meeting."`},

{id:'objections',name:'10. Objections',md:`## 10. Objections

All 19 objections live in the **Study** tab — triggers, exact responses, hints, and "why this works." That's the canonical source.

**Where objections typically come up:**

| Call Stage | Likely Objections |
|---|---|
| Gatekeeper | Not Interested — Lower Level, Send an Email |
| Owner/SM Qualifying | Happy with Current Provider, All Customer Routed, Not Interested — DM, We Have Our Own Trucks, No More Providers, BID/RFP/RFQ, Budget/Won't Give Price |
| Pass Down | Handled inline in the script itself |
| Invoice Push | Invoice Objection (3 options) |
| Anytime | No Time, Won't Use a Broker LTL, Bad Experience w/P1, Eggs in One Basket, Honeymoon, Contract Objection LTL |

---

## How The Call Flows

1. **Dial.** Gatekeeper picks up.
2. **Push for the owner.** They transfer you, pass you to a shipping manager, or object.
3. **Shipping Manager:** run MVPCC. DM? → Setting Up The Meeting. Not DM? → Key Questions, follow up with owner.
4. **Owner:** run MVPCC. Pass down? → The Pass Down. DM? → Setting Up The Meeting.
5. **Meeting set** → confirm email + time zone → send invite → request invoices → trial close.
6. **Objection at any point** → Study tab → return to where you left off.

### Key Rules
- Always push twice before backing off a gatekeeper objection
- Don't set a meeting with a SM unless they confirm they're the true DM
- True DM = the person who brought on the current provider
- Invoice pushes: 1-2 for truckload, up to 3 for LTL
- Build rapport throughout AND on follow-ups
- Ask the second question — don't accept a one-word answer
- Know when to let it go — especially "Bad Experience with Priority1"
- **Meeting-push rule:** push for the meeting unless the response is a price objection — handle price first, then push
- **Standing follow-up rule:** on ANY follow-up call, regardless of outcome, always ask for the next load to quote`},

    text:`Trigger: "${o.trigger}"\nHint: ${o.hint}\nResponse: ${o.parts.join('\n')}\nWhy this works: ${o.why}`}));
  return chunks;
}
const KNOWLEDGE_INDEX=buildKnowledgeIndex();

// Naive keyword retrieval: score chunks by overlap with query words, return top N
function retrieveContext(query,n=5){
  const words=query.toLowerCase().match(/[a-z0-9$%°]+/g)||[];
  const stop=new Set(['the','a','an','is','are','to','for','of','and','or','in','on','what','how','do','does','i','my','me','you','your','can','should','with','this','that']);
  const terms=words.filter(w=>w.length>2&&!stop.has(w));
  if(terms.length===0)return[];
  const scored=KNOWLEDGE_INDEX.map(c=>{
    const hay=(c.title+' '+c.text).toLowerCase();
    let score=0;
    terms.forEach(t=>{
      const matches=hay.split(t).length-1;
      score+=matches*(c.title.toLowerCase().includes(t)?3:1);
    });
    return {...c,score};
  });
  return scored.filter(c=>c.score>0).sort((a,b)=>b.score-a.score).slice(0,n);
}

// ─── AI COACH: GEMINI API CALL ─────────────────────────────────────────────
async function callGemini({apiKey,model,systemPrompt,messages,useSearch}){
  if(!apiKey)throw new Error('NO_KEY');
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  const body={
    contents:messages.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.text}]})),
    systemInstruction:{parts:[{text:systemPrompt}]},
    generationConfig:{temperature:0.6,maxOutputTokens:800},
  };
  if(useSearch)body.tools=[{google_search:{}}];
  const res=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key':apiKey},
    body:JSON.stringify(body),
  });
  if(!res.ok){
    const errText=await res.text().catch(()=>'');
    throw new Error(`HTTP_${res.status}:${errText.slice(0,200)}`);
  }
  const data=await res.json();
  const cand=data.candidates&&data.candidates[0];
  if(!cand)throw new Error('NO_CANDIDATE');
  const text=(cand.content&&cand.content.parts||[]).map(p=>p.text||'').join('');
  const grounded=!!(cand.groundingMetadata);
  return {text,grounded};
}

function monthKey(){const d=new Date();return `perf_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}

// Aggregate daily entries into monthly totals/averages
function perfTotals(perf){
  const days=perf.days||{};
  const dayList=Object.values(days);
  const totals={};
  PERF_DAILY.forEach(t=>{
    if(t.isAvg){
      const vals=dayList.map(d=>d[t.key]).filter(v=>v!=null);
      totals[t.key]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
      totals[t.key+'_days']=vals.length;
    } else {
      totals[t.key]=dayList.reduce((sum,d)=>sum+(d[t.key]||0),0);
    }
  });
  return totals;
}

  // ─── FLASHCARD ────────────────────────────────────────────────────────────
  function FlashCard(){
    if(!card){
      return(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',gap:16,padding:24,textAlign:'center'}}>
          <div style={{fontSize:44}}>🎉</div>
          <div style={{fontSize:20,fontWeight:700}}>Day Complete!</div>
          <div style={{fontSize:13,color:c.textSub}}>
            {selDay?`${selDay.ids.filter(id=>getStatus(id)==='mastered').length} / ${selDay.ids.length} mastered`:''}
          </div>
          <button onClick={()=>setStudyView('setList')} style={{marginTop:8,padding:'14px 32px',
            background:c.accent,color:c.accentText,borderRadius:12,fontSize:13,fontWeight:700}}>
            Back to Set →
          </button>
        </div>
      );
    }
    const s=getStatus(card.id);
    const dayObj=DAYS.find(d=>d.id===card.day)||DAYS[0];
    const activeDayIds=(selDay?selDay.ids:dayObj.ids);
    const originalTotal=activeDayIds.length;
    const dayMastered=activeDayIds.filter(id=>getStatus(id)==='mastered').length;
    const dayMasteredPct=Math.round((dayMastered/originalTotal)*100);
    const repCount=reps[card.id]||0;

    return(
      <div className="scroll" style={S.scrollArea}>
        <div style={S.hdr}>
          <button onClick={()=>setStudyView('setList')}
            style={{background:'none',color:c.textSub,display:'flex',alignItems:'center',gap:4,
              fontSize:13,fontWeight:600,padding:'4px 0'}}>
            <Icon.back color={c.textSub} size={18}/>{selDay?selDay.title:'Study'}
          </button>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>saveQuizMode(!quizMode)}
              style={{padding:'4px 10px',borderRadius:20,border:`1px solid ${quizMode?'#a78bfa':c.border}`,
                background:quizMode?'#1e1040':'none',color:quizMode?'#a78bfa':c.textSub,
                fontSize:9,fontWeight:700,letterSpacing:'0.1em',cursor:'pointer'}}>
              {quizMode?'👥 QUIZ':'👤 SOLO'}
            </button>
            <span style={{fontSize:11,color:c.textMuted}}>{repCount} rep{repCount===1?'':'s'}</span>
            <span style={{fontSize:12,color:c.textSub,fontWeight:700}}>{dayMastered} / {originalTotal} mastered</span>
          </div>
        </div>
        <div style={{height:3,background:c.surfaceHigh,margin:'0 20px 14px'}}>
          <div style={{height:'100%',background:c.accent,borderRadius:2,width:`${dayMasteredPct}%`,transition:'width 0.3s'}}/>
        </div>

        {!revealed&&(
          <div className="fade-in" style={S.flashFront} onClick={()=>setRevealed(true)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                {quizMode&&<div style={{fontSize:9,color:'#a78bfa',letterSpacing:'0.14em',fontWeight:700}}>👥 QUIZ MODE — READ ALOUD TO ZYAN ↓</div>}
                <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.18em',color:c.accent}}>OBJECTION</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Badge status={s}/>
                {!quizMode&&<button onClick={e=>{e.stopPropagation();setHinted(h=>!h);}}
                  style={{padding:'4px 10px',background:hinted?`${c.accent}22`:'none',
                    border:`1px solid ${hinted?c.accent:c.border}`,borderRadius:20,
                    fontSize:10,fontWeight:700,color:hinted?c.accent:c.textSub,
                    letterSpacing:'0.06em',transition:'all 0.15s'}}>💡 hint</button>}
              </div>
            </div>
            <div className="mono" style={{fontSize:17,lineHeight:1.55,color:c.text,fontStyle:'italic',marginBottom:hinted?10:6}}>"{card.trigger}"</div>
            <div style={{fontSize:11,color:c.textMuted,marginBottom:hinted?12:8}}>Rehearsed {repCount} time{repCount===1?'':'s'}</div>
            {hinted&&(
              <div style={{background:c.why,borderRadius:12,padding:'12px 14px',border:`1px solid ${c.whyBorder}`}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.16em',color:c.whyText,marginBottom:5}}>💡 HINT</div>
                <div style={{fontSize:12,lineHeight:1.6,color:c.whyText}}>{card.hint}</div>
              </div>
            )}
            {!hinted&&(
              <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:6,marginTop:8,color:c.textSub}}>
                <span style={{fontSize:11,letterSpacing:'0.08em'}}>{quizMode?'Tap when Zyan is done — reveal to check':'Tap to reveal answer'}</span>
                <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            )}
          </div>
        )}

        {revealed&&(
          <div className="fade-in">
            {card.parts.slice(0,parts===0?1:parts+1).map((p,i)=>{
              if(i>=parts+1)return null;
              const {label,text}=parsePart(p,i,totalParts);
              return(
                <div key={i} className="fade-in" style={S.flashBack} onClick={()=>{setParts(0);setRevealed(false);}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.18em',color:'#60a5fa'}}>{label}</div>
                    {i===0&&<div style={{fontSize:9,color:c.textMuted}}>tap to hide</div>}
                  </div>
                  <div className="mono" style={{fontSize:13,lineHeight:1.75,color:theme==='dark'?'#d0e0ff':'#1e3a5f',whiteSpace:'pre-line'}}>{text}</div>
                </div>
              );
            })}

            {revealed&&parts<totalParts-1&&(()=>{
              const np=card.parts[parts+1];
              const {label:nxtLabel}=np?parsePart(np,parts+1,totalParts):{label:null};
              const isGeneric=!nxtLabel||nxtLabel.startsWith('PART ');
              const btnText=isGeneric?'NEXT →':`${nxtLabel} →`;
              return(
              <div style={{padding:'0 16px 10px'}}>
                {quizMode&&!isGeneric&&<div style={{fontSize:9,color:'#60a5fa',letterSpacing:'0.1em',textAlign:'center',marginBottom:5,fontWeight:700}}>COACH: THIS IS THE NEXT SCENARIO ↓</div>}
                <button onClick={()=>setParts(p=>p+1)} style={{width:'100%',padding:'14px',background:c.surfaceHigh,
                  border:`1px solid ${c.flashBorder}`,borderRadius:12,color:'#60a5fa',fontSize:12,fontWeight:700,
                  letterSpacing:'0.06em',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,color:c.textSub}}>PART {parts+2} OF {totalParts}</span>
                  <span>{btnText}</span>
                </button>
              </div>
              );
            })()}

            {revealed&&parts>=totalParts-1&&(
              <div className="fade-in" style={S.whyBox}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.18em',color:c.whyText,marginBottom:6}}>WHY THIS WORKS</div>
                <div style={{fontSize:12,lineHeight:1.65,color:c.whyText}}>{card.why}</div>
              </div>
            )}

            {revealed&&parts>=totalParts-1&&(
              <>
                <div style={{padding:'4px 16px 10px'}}>
                  <button onClick={rehearseCard} style={S.rehearseBtn}>
                    <span style={{fontSize:15}}>↻</span><span>REHEARSE +1 REP</span>
                    <span style={{fontSize:11,color:theme==='dark'?'#93c5fd':'#1d4ed8'}}>({repCount})</span>
                  </button>
                  <div style={{fontSize:10,color:c.textMuted,textAlign:'center',marginTop:6}}>Use this when you want to run the same line again before rating it.</div>
                </div>
                <div style={S.actionRow}>
                  <button onClick={()=>advance('toReview')} style={{...S.actionBtn('#ef4444','#1a0505')}}>
                    <span style={{fontSize:16}}>↩</span><span style={{fontSize:9,letterSpacing:'0.06em'}}>{quizMode?'RETRY':'AGAIN'}</span>
                  </button>
                  <button onClick={()=>advance('learning')} style={{...S.actionBtn('#f59e0b','#1c1206')}}>
                    <span style={{fontSize:16}}>◐</span><span style={{fontSize:9,letterSpacing:'0.06em'}}>{quizMode?'CLOSE':'LEARNING'}</span>
                  </button>
                  <button onClick={()=>advance('mastered')} style={{...S.actionBtn('#22c55e','#052e16')}}>
                    <span style={{fontSize:16}}>✓</span><span style={{fontSize:9,letterSpacing:'0.06em'}}>{quizMode?'NAILED IT':'MASTERED'}</span>
                  </button>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    );
  }

  // ─── REFERENCE SCREEN ───────────────────────────────────────────────────────
  function ReferenceScreen(){
    const DATASETS={scripts:SCRIPTS,modes:MODES,valueadds:VALUEADDS,quotes:QUOTES};
    const tabs=[
      {id:'scripts',label:'Scripts'},{id:'modes',label:'Modes'},{id:'glossary',label:'Glossary'},
      {id:'valueadds',label:'Value Adds'},{id:'quotes',label:'Quotes'},
    ];
    const q=refSearch.trim().toLowerCase();
    const ALL_GLOSSARY=[...GLOSSARY,...customGlossary];
    const ALL_GLOSSARY_SECTIONS=customGlossary.length?[...GLOSSARY_SECTIONS,'Custom (AI-Added)']:GLOSSARY_SECTIONS;

    let items=[];
    if(refTab==='glossary'){
      items=ALL_GLOSSARY.filter(g=>!q||g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q)||g.section.toLowerCase().includes(q));
    } else {
      const data=DATASETS[refTab]||[];
      items=data.filter(d=>!q||d.name.toLowerCase().includes(q)||d.md.toLowerCase().includes(q));
    }

    return(
      <div className="scroll" style={S.scrollArea}>
        <div ref={refTopBarRef} style={{position:'sticky',top:0,zIndex:20,background:c.bg}}>
          <div style={S.hdr}>
            <div style={S.hdrLeft}>
              <span style={S.hdrBrand}>PRIORITY1</span>
              <span style={S.hdrTitle}>Reference</span>
            </div>
          </div>

          {/* Search */}
          <div style={{padding:'0 20px 10px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,background:c.surfaceHigh,
              borderRadius:12,padding:'9px 12px',border:`1px solid ${c.border}`}}>
              <Icon.search size={16} color={c.textSub}/>
              <input value={refSearch} onChange={e=>setRefSearch(e.target.value)}
                placeholder="Search..." style={{flex:1,background:'none',border:'none',outline:'none',
                color:c.text,fontSize:13}}/>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',gap:6,padding:'0 20px 12px',overflowX:'auto'}} className="scroll">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>{setRefTab(t.id);setCollapsedRefIds(new Set());}} style={S.chipBtn(refTab===t.id)}>{t.label}</button>
            ))}
          </div>
        </div>


        {/* Glossary list */}
        {refTab==='glossary'&&(
          <>
            {ALL_GLOSSARY_SECTIONS.map(sec=>{
              const secItems=items.filter(g=>g.section===sec);
              if(secItems.length===0)return null;
              return(
                <div key={sec}>
                  <div style={{position:'sticky',top:refTopBarHeight,zIndex:10,
                    margin:'0 0 8px',padding:'10px 20px',background:c.bg,
                    borderBottom:`1px solid ${c.border}`,
                    borderLeft:`3px solid ${c.accent}`}}>
                    <span style={{fontSize:12,fontWeight:800,letterSpacing:'0.14em',color:c.accent}}>{sec.toUpperCase()}</span>
                  </div>
                  {secItems.map((g,idx)=>(
                    <div key={idx} style={{...S.cardBorder,padding:'12px 16px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                        <div style={{fontSize:13,fontWeight:700,color:c.text,marginBottom:4}}>{g.term}</div>
                        {sec==='Custom (AI-Added)'&&(
                          <button onClick={()=>saveCustomGlossary(customGlossary.filter(cg=>cg!==g))}
                            style={{background:'none',color:c.textMuted,fontSize:10,flexShrink:0}}>delete</button>
                        )}
                      </div>
                      <div style={{fontSize:12,lineHeight:1.6,color:c.textSub}}>{g.def}</div>
                    </div>
                  ))}
                </div>
              );
            })}
            {items.length===0&&<div style={{padding:'30px 20px',textAlign:'center',color:c.textMuted,fontSize:13}}>No terms found.</div>}
          </>
        )}

        {/* Scripts / Modes / Value Adds / Quotes — open by default, collapsible */}
        {refTab!=='glossary'&&items.map(item=>{
          const key=`${refTab}-${item.id}`;
          const open=!collapsedRefIds.has(key);
          const toggle=()=>{
            const next=new Set(collapsedRefIds);
            if(open)next.add(key); else next.delete(key);
            setCollapsedRefIds(next);
          };
          return(
            <div key={key} style={{...S.cardBorder,padding:0,overflow:'hidden'}}>
              <div onClick={toggle}
                style={{padding:'14px 16px',display:'flex',justifyContent:'space-between',
                  alignItems:'center',cursor:'pointer'}}>
                <span style={{fontSize:13,fontWeight:700,color:c.text}}>{item.name}</span>
                <div style={{transform:open?'rotate(90deg)':'none',transition:'transform 0.15s'}}>
                  <Icon.chevron color={c.textMuted} size={16}/>
                </div>
              </div>
              {open&&<div style={{padding:'0 16px 14px'}}><MD text={item.md} c={c}/></div>}
            </div>
          );
        })}
        {refTab!=='glossary'&&items.length===0&&<div style={{padding:'30px 20px',textAlign:'center',color:c.textMuted,fontSize:13}}>No results.</div>}
      </div>
    );
  }

  // ─── JOURNAL & PERFORMANCE SCREEN ─────────────────────────────────────────

      const entry={id:Date.now(),...entryForm,createdAt:Date.now()};
      const next=[entry,...entries].sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt-a.createdAt);
      await saveEntries(next);
      setEntryForm({date:todayKey(),whatHappened:'',whatWorked:'',whatDifficult:'',lesson:'',nextAction:''});
      setShowAddEntry(false);
      showToast('Journal entry saved');
    };

      const next=entries.filter(e=>e.id!==id);
      await saveEntries(next);
    };

    return(
      <div className="scroll" style={S.scrollArea}>
        <div style={S.hdr}>
          <div style={S.hdrLeft}>
            <span style={S.hdrBrand}>PRIORITY1</span>
            <span style={S.hdrTitle}>Journal</span>
          </div>
        </div>

        <div style={{display:'flex',gap:6,padding:'0 20px 12px'}}>

          <button onClick={()=>setJournalTab('performance')} style={S.chipBtn(journalTab==='performance')}>Performance</button>

          </div>
        )}

        {journalTab==='journal'&&(
          <>
            {!showAddEntry&&(
              <div style={{padding:'0 20px 12px'}}>
                <button onClick={()=>setShowAddEntry(true)} style={{width:'100%',padding:'13px',
                  background:c.accent,color:c.accentText,borderRadius:12,fontSize:13,fontWeight:700,
                  letterSpacing:'0.06em',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Icon.plus size={16} color={c.accentText}/> New Entry

            {showAddEntry&&(
              <div style={{...S.cardBorder}}>
                <label style={S.label}>DATE</label>
                <input type="date" max={todayKey()} value={entryForm.date}
                  onChange={e=>setEntryForm(f=>({...f,date:e.target.value}))}

                <label style={S.label}>WHAT HAPPENED</label>
                <textarea style={{...S.input,marginBottom:10}} rows={2} value={entryForm.whatHappened}
                  onChange={e=>setEntryForm(f=>({...f,whatHappened:e.target.value}))}
                  placeholder="Calls made, meetings, quotes sent..."/>
                <label style={S.label}>WHAT WORKED</label>
                <textarea style={{...S.input,marginBottom:10}} rows={2} value={entryForm.whatWorked}
                  onChange={e=>setEntryForm(f=>({...f,whatWorked:e.target.value}))}/>
                <label style={S.label}>WHAT WAS DIFFICULT</label>
                <textarea style={{...S.input,marginBottom:10}} rows={2} value={entryForm.whatDifficult}

  function buildContextBlock(mode,query){
    if(mode==='roleplay'){
      return OBJ.map(o=>`### ${o.name}\nTrigger: "${o.trigger}"\nHint: ${o.hint}\nOfficial response: ${o.parts.join(' ')}\nWhy it works: ${o.why}`).join('\n\n');
    }
    const chunks=retrieveContext(query,5);
    if(chunks.length===0)return "(No directly matching content found in Zyan's reference library for this query — answer from general knowledge, and say so.)";
    return chunks.map(c=>`### [${c.source}] ${c.title}\n${c.text}`).join('\n\n');
  }

  function CoachScreen(){
    const sendCoachMessage=async(textOverride)=>{
      const text=(textOverride??coachInput).trim();
      if(!text||coachLoading)return;
      if(!geminiKey){ setCoachError('no-key'); return; }
      setCoachError(null);
      const userMsg={role:'user',text};
      const nextMessages=[...coachMessages,userMsg];
      setCoachMessages(nextMessages);
      setCoachInput('');
      setCoachLoading(true);
      try{
        const context=buildContextBlock(coachMode,text);
        const base=coachMode==='roleplay'?ROLEPLAY_SYSTEM_PROMPT:COACH_SYSTEM_PROMPT;
        const sysPrompt=`${base}\n\nCONTEXT:\n${context}`;
        const {text:reply}=await callGemini({apiKey:geminiKey,model:geminiModel,systemPrompt:sysPrompt,
          messages:nextMessages,useSearch:coachUseSearch&&coachMode==='chat'});
        setCoachMessages([...nextMessages,{role:'assistant',text:reply}]);
      }catch(e){
        let msg="Something went wrong talking to Gemini.";
        if(e.message==='NO_KEY')msg='No API key set — add one in Settings.';
        else if(/^HTTP_4/.test(e.message))msg=`Gemini rejected the request (${e.message.split(':')[0]}). Check your API key and model name in Settings.`;
        else if(/^HTTP_/.test(e.message))msg=`Gemini error: ${e.message.slice(0,100)}`;
        else msg=`${e.name||'Error'}: ${e.message||'unknown'} — if this says "Failed to fetch", the network request itself was blocked (often a preview/sandbox restriction — try this in your real downloaded browser, not an embedded preview).`;
        setCoachError(msg);
      }
      setCoachLoading(false);
    };

    const saveAsGlossaryTerm=(text)=>{
      const term=window.prompt("Save this as a glossary term. Enter the term name:");
      if(!term)return;
      const def=text.length>500?text.slice(0,500)+'...':text;
      saveCustomGlossary([...customGlossary,{term,def,section:'Custom (AI-Added)'}]);
      showToast('Saved to Glossary');
    };

    const switchMode=(m)=>{
      setCoachMode(m);
      setCoachMessages([]);
      setCoachError(null);
    };

    const SUGGESTIONS=[
      "What's a good GP margin for flatbed right now?",

      return(

              background:c.accent,color:c.accentText,borderRadius:12,fontSize:13,fontWeight:700,letterSpacing:'0.06em'}}>
              Add API Key in Settings →
            </button>

      );
    }

    return(
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingBottom:60}}>
        <div style={S.hdr}>
          <div style={S.hdrLeft}><span style={S.hdrBrand}>PRIORITY1</span><span style={S.hdrTitle}>AI Coach</span></div>
        </div>

        <div style={{display:'flex',gap:6,padding:'0 20px 10px',alignItems:'center'}}>
          <button onClick={()=>switchMode('chat')} style={S.chipBtn(coachMode==='chat')}>💬 Coach</button>
          <button onClick={()=>switchMode('roleplay')} style={S.chipBtn(coachMode==='roleplay')}>🎭 Roleplay</button>
          {coachMode==='chat'&&(
            <button onClick={()=>setCoachUseSearch(v=>!v)} style={{...S.chipBtn(coachUseSearch),marginLeft:'auto'}}>

        <div ref={coachScrollRef} className="scroll" style={{flex:1,overflowY:'auto',padding:'0 16px 8px'}}>
          {coachMessages.length===0&&(
            <div style={{padding:'10px 4px'}}>
              {coachMode==='roleplay'?(
                <div style={{...S.cardBorder,margin:'0 0 10px'}}>
                  <div style={{fontSize:12,color:c.text,lineHeight:1.6,marginBottom:10}}>
                    Roleplay mode: I'll play a freight prospect and throw an objection at you — picked from your 19-card library.

                    <button key={i} onClick={()=>sendCoachMessage(s)} style={{display:'block',width:'100%',

            </div>

        </div>

        {coachError&&(
          <div style={{margin:'0 16px 8px',padding:'10px 14px',background:c.why,border:`1px solid ${c.whyBorder}`,
            borderRadius:10,fontSize:11,color:c.whyText}}>

          </div>
        )}

        <div style={{padding:'8px 16px',borderTop:`1px solid ${c.border}`,display:'flex',gap:8,alignItems:'flex-end'}}>
          <textarea value={coachInput} onChange={e=>setCoachInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendCoachMessage(); } }}
            placeholder={coachMode==='roleplay'?"Respond to the prospect...":"Ask the coach..."}

          <button onClick={()=>sendCoachMessage()} disabled={coachLoading}

          </button>
        </div>
      </div>
    );

      {id:'reference',label:'REFERENCE',Icon:Icon.book},
      {id:'coach',label:'COACH',Icon:Icon.coach},
      {id:'journal',label:'JOURNAL',Icon:Icon.journal},
      {id:'settings',label:'SETTINGS',Icon:Icon.settings},
    ];
    return(
      <nav style={S.nav}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setView(t.id);if(t.id==='study'&&studyView==='card')setStudyView('dayList');}}
            style={S.navBtn(view===t.id)}>
            <t.Icon size={19} color={view===t.id?c.accent:c.textSub}/>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    );
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  return(
    <div style={S.wrap}>
      {view==='home'&&HomeScreen()}
      {view==='study'&&StudyScreen()}
      {view==='reference'&&ReferenceScreen()}
      {view==='coach'&&CoachScreen()}
      {view==='journal'&&JournalScreen()}
      {view==='settings'&&SettingsScreen()}
      {toast&&(<div className="fade-in" style={{position:'fixed',left:'50%',bottom:74,transform:'translateX(-50%)',
        maxWidth:440,width:'calc(100% - 40px)',background:theme==='dark'?'#1e1e1e':'#ffffff',
        color:c.text,border:`1px solid ${c.border}`,borderRadius:14,padding:'12px 16px',
        boxShadow:'0 10px 30px rgba(0,0,0,0.35)',zIndex:200,textAlign:'center',
        fontSize:12,fontWeight:700,letterSpacing:'0.04em'}}>
        {toast}
      </div>)}
      {NavBar()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
